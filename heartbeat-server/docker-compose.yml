services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/heartbeat_monitor
      CORS_ORIGIN: http://localhost:3000,http://localhost
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      JWT_SECRET: change-me-access-secret
      REFRESH_TOKEN_SECRET: change-me-refresh-secret
    ports:
      - "3002:3002"

  frontend:
    build:
      context: ./monitor-ui
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3002/api
        REACT_APP_SOCKET_URL: http://localhost:3002
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
