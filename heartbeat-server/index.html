<!DOCTYPE html>

<html>
<head>
  <title>Node Monitor</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }


h1 {
  text-align: center;
}

#nodes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
  transition: 0.3s;
}

.alive {
  background: #064e3b;
  border: 2px solid #10b981;
}

.dead {
  background: #450a0a;
  border: 2px solid #ef4444;
}


  </style>
</head>

<body>
  <h1>🚀 Node Monitoring Dashboard</h1>
  <div id="nodes"></div>

  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('http://localhost:3002/status');
        const data = await res.json();

        const container = document.getElementById('nodes');
        container.innerHTML = '';

        for (let id in data) {
          const node = data[id];

          const div = document.createElement('div');
          div.className = `card ${node.status === 'ALIVE' ? 'alive' : 'dead'}`;

          div.innerHTML = `
            <h2>${id}</h2>
            <p>${node.status}</p>
          `;

          container.appendChild(div);
        }

      } catch (err) {
        console.error(err);
      }
    }

    setInterval(fetchStatus, 2000);
    fetchStatus();
  </script>

</body>
</html>
